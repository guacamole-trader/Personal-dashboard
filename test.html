<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connection Test</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 1rem; }
    input { display: block; width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #378ADD; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    #status { margin-top: 1rem; padding: 10px; border-radius: 4px; display: none; }
    .ok  { background: #EAF3DE; color: #27500A; }
    .err { background: #FCEBEB; color: #791F1F; }
  </style>
</head>
<body>
  <h2>Dashboard — Connection Test</h2>
  <p style="color:#666;font-size:13px">This tests your Supabase connection only.</p>
  <input type="email" id="email" placeholder="Your email"/>
  <input type="password" id="pass" placeholder="Your password"/>
  <button onclick="test()">Test login</button>
  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── PASTE YOUR KEYS HERE ──
    const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    const st = document.getElementById('status');

    async function test() {
      st.style.display = 'block';
      st.className = '';
      st.textContent = 'Connecting…';
      try {
        const { data, error } = await db.auth.signInWithPassword({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('pass').value
        });
        if (error) {
          st.className = 'err';
          st.textContent = '❌ Error: ' + error.message;
        } else {
          st.className = 'ok';
          st.textContent = '✅ Login works! Supabase is connected. User: ' + data.user.email;
        }
      } catch(e) {
        st.className = 'err';
        st.textContent = '❌ Exception: ' + e.message;
      }
    }
  </script>
</body>
</html>
